name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run release checks
        run: |
          nix build --print-build-logs \
            .#checks.x86_64-linux.fennelCheck \
            .#checks.x86_64-linux.tests

  build:
    name: Build ${{ matrix.group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: linux-x86_64
            entries: |
              fen linux-x86_64-musl-static native,fenNoStoreRefs,fenNoDynamicDeps
          - group: linux-aarch64
            entries: |
              fen-linux-aarch64-musl-static linux-aarch64-musl-static fenSmoke-linux-aarch64-musl-static,fenNoStoreRefs-linux-aarch64-musl-static,fenNoDynamicDeps-linux-aarch64-musl-static
          - group: linux-armv7-family
            entries: |
              fen-linux-armv7-musleabihf-static linux-armv7-musleabihf-static fenSmoke-linux-armv7-musleabihf-static,fenNoStoreRefs-linux-armv7-musleabihf-static,fenNoDynamicDeps-linux-armv7-musleabihf-static
              fen-linux-armv7-n900-musleabihf-static linux-armv7-n900-musleabihf-static fenSmoke-linux-armv7-n900-musleabihf-static,fenNoStoreRefs-linux-armv7-n900-musleabihf-static,fenNoDynamicDeps-linux-armv7-n900-musleabihf-static
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build release binaries
        run: |
          set -eu
          mkdir -p dist
          FEN_VERSION=$(git describe --tags --match 'v[0-9]*' --dirty --always)
          if [ "$FEN_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "error: release version $FEN_VERSION does not match tag $GITHUB_REF_NAME" >&2
            exit 1
          fi
          export FEN_VERSION

          build_attrs=
          while read -r attr asset checks; do
            [ -n "$attr" ] || continue
            build_attrs="$build_attrs .#$attr"
          done <<'EOF'
          ${{ matrix.entries }}
          EOF

          echo "::group::Build ${{ matrix.group }}"
          # Intentionally split the attr list: attrs are controlled by this workflow.
          nix build --impure --print-build-logs --no-link $build_attrs
          echo "::endgroup::"

          while read -r attr asset checks; do
            [ -n "$attr" ] || continue
            out=$(nix build --impure --no-link --print-out-paths ".#$attr")

            old_ifs=$IFS
            IFS=,
            for check in $checks; do
              IFS=$old_ifs
              case "$check" in
                native)
                  "$out/bin/fen" --help >/dev/null
                  "$out/bin/fen" --version | grep -F "$FEN_VERSION"
                  ;;
                '')
                  ;;
                *)
                  echo "::group::Check $check"
                  nix build --impure --print-build-logs ".#checks.x86_64-linux.$check"
                  echo "::endgroup::"
                  ;;
              esac
              IFS=,
            done
            IFS=$old_ifs

            cp "$out/bin/fen" "dist/fen-${GITHUB_REF_NAME}-$asset"
            chmod +x "dist/fen-${GITHUB_REF_NAME}-$asset"
          done <<'EOF'
          ${{ matrix.entries }}
          EOF

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fen-${{ matrix.group }}
          path: dist/fen-${{ github.ref_name }}-*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [checks, build]
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -eu
          cd dist
          sha256sum fen-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fen-*
            dist/SHA256SUMS
