<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Fen TUI screen regions</title>
  <desc id="desc">Diagram of the terminal screen split into a top status row, optional panels below the status row, a transcript region, optional panels above input, and a bottom input region.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.frame{fill:#ffffff;stroke:#111827;stroke-width:3}.region{stroke:#1f2937;stroke-width:2;rx:10}.status{fill:#dbeafe}.below{fill:#ede9fe}.transcript{fill:#dcfce7}.above{fill:#fef3c7}.input{fill:#fee2e2}.label{font:600 24px system-ui,sans-serif;fill:#111827}.small{font:18px system-ui,sans-serif;fill:#374151}.code{font:18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111827}.arrow{stroke:#4b5563;stroke-width:3;marker-end:url(#arrowhead);fill:none}.muted{fill:#6b7280}
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect class="bg" width="920" height="620"/>
  <rect class="frame" x="90" y="40" width="520" height="540" rx="16"/>
  <rect class="region status" x="120" y="70" width="460" height="48"/>
  <text class="label" x="140" y="102">status row</text>
  <text class="code" x="335" y="101">model · ctx · scroll · alerts</text>
  <rect class="region below" x="120" y="135" width="460" height="70"/>
  <text class="label" x="140" y="177">below-status panels</text>
  <text class="small" x="365" y="176">errors, docs, inspectors</text>
  <rect class="region transcript" x="120" y="222" width="460" height="210"/>
  <text class="label" x="140" y="260">transcript</text>
  <text class="small" x="140" y="294">conversation, tool rows, scrollback</text>
  <text class="small" x="140" y="326">follows live bottom until user scrolls</text>
  <text class="small" x="140" y="358">new content below is shown as ↓new</text>
  <rect class="region above" x="120" y="449" width="460" height="58"/>
  <text class="label" x="140" y="485">above-input panels</text>
  <text class="small" x="372" y="484">completion, busy</text>
  <rect class="region input" x="120" y="524" width="460" height="36"/>
  <text class="label" x="140" y="550">input</text>
  <text class="code" x="235" y="548">&gt; /help, ctrl-j newline</text>
  <text class="label" x="665" y="105">Stable spatial contract</text>
  <text class="small" x="665" y="145">The status and input are anchors.</text>
  <text class="small" x="665" y="177">Panels ask for rows per frame.</text>
  <text class="small" x="665" y="209">The transcript gets whatever remains.</text>
  <text class="small" x="665" y="241">Hidden panels have height 0.</text>
  <path class="arrow" d="M665 275 C620 275 620 170 590 170"/>
  <path class="arrow" d="M665 315 C620 315 620 478 590 478"/>
  <text class="small muted" x="665" y="365">Extension contribution surfaces:</text>
  <text class="code" x="665" y="399">:status</text>
  <text class="code" x="665" y="430">:panel</text>
  <text class="code" x="665" y="461">:control</text>
  <text class="code" x="665" y="492">:command</text>
  <text class="code" x="665" y="523">events</text>
</svg>
